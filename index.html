<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ساعت کاری شیفت شب ۱۴۰۵</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

    <style>
        body {
            font-family: 'Vazirmatn', sans-serif;
            -webkit-tap-highlight-color: transparent;
            transition: background-color 0.3s, color 0.3s;
        }
        body.dark { background-color: #0d0d12; color: #ffffff; }
        body.light { background-color: #f4f5f7; color: #1e1e24; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #27273a; border-radius: 10px; }
    </style>
</head>
<body class="dark pb-36 selection:bg-red-500/30">

    <div class="max-w-md mx-auto px-4 pt-4">
        <div class="flex justify-between items-center mb-4">
            <div class="flex items-center gap-2">
                <span class="text-xl">⏱️</span>
                <div>
                    <h1 class="text-sm font-bold tracking-tight opacity-90">ساعت کاری شیفت شب ۱۴۰۵</h1>
                    <p class="text-[10px] text-gray-500">Black Edition</p>
                </div>
            </div>
            <button id="themeToggle" class="p-2 rounded-xl bg-gray-900/50 border border-gray-800 text-base">🌙</button>
        </div>

        <div class="flex justify-between items-center bg-[#16161f] border border-gray-950/40 rounded-2xl p-3 mb-4 shadow-lg dynamic-card">
            <button onclick="changeMonth(-1)" class="text-gray-400 hover:text-white text-base p-1">▶</button>
            <div class="text-center">
                <h2 id="monthTitle" class="text-base font-bold text-red-500">فروردین ۱۴۰۵</h2>
                <p id="todayLabel" class="text-[9px] text-gray-400 mt-0.5">امروز: جمعه ۱۵ فروردین</p>
            </div>
            <button onclick="changeMonth(1)" class="text-gray-400 hover:text-white text-base p-1">◀</button>
        </div>

        <div class="bg-[#16161f] border border-gray-950/40 rounded-2xl p-4 mb-4 shadow-xl dynamic-card">
            <h3 class="text-center text-red-500 font-bold mb-3 text-[11px] tracking-wider">خلاصه ماه</h3>
            <div class="grid grid-cols-3 gap-2 text-center">
                <div class="bg-[#12121a] p-2.5 rounded-xl border border-gray-800/60 dynamic-subcard">
                    <span class="text-gray-400 text-[9px] block mb-1">کل کرایه</span>
                    <span id="totalFareBadge" class="text-xs font-black text-white">۰</span>
                    <span class="text-[8px] text-gray-500 block mt-0.5">تومان</span>
                </div>
                <div class="bg-[#12121a] p-2.5 rounded-xl border border-gray-800/60 dynamic-subcard">
                    <span class="text-gray-400 text-[9px] block mb-1">کل اضافه کاری</span>
                    <span id="totalOtBadge" class="text-xs font-black text-red-500">۰۰:۰۰</span>
                    <span class="text-[8px] text-gray-500 block mt-0.5">ساعت</span>
                </div>
                <div class="bg-[#12121a] p-2.5 rounded-xl border border-gray-800/60 dynamic-subcard">
                    <span class="text-gray-400 text-[9px] block mb-1">تعداد روز کارکرد</span>
                    <span id="totalDaysBadge" class="text-xs font-black text-emerald-500">۰</span>
                    <span class="text-[8px] text-gray-500 block mt-0.5">روز</span>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-12 gap-1 text-center text-[9px] text-gray-500 font-bold mb-2 px-2">
            <div class="col-span-1 text-right">کارکرد</div>
            <div class="col-span-3 text-right pr-2">تاریخ / روز</div>
            <div class="col-span-2">ورود</div>
            <div class="col-span-2">خروج</div>
            <div class="col-span-1">اضافه</div>
            <div class="col-span-3 text-left pl-2">کرایه (تومان)</div>
        </div>

        <div id="daysList" class="space-y-1.5 max-h-[42vh] overflow-y-auto custom-scrollbar pr-0.5">
            </div>

        <div class="bg-[#16161f] border border-gray-950/40 rounded-2xl p-3 mt-4 shadow-xl dynamic-card">
            <h4 class="text-center text-gray-400 font-medium mb-2 text-[10px]">📊 نمودار اضافه کاری (ساعت)</h4>
            <div class="h-24 w-full">
                <canvas id="analyticsChart"></canvas>
            </div>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-[#0d0d12]/95 backdrop-blur-md border-t border-gray-800/60 shadow-2xl z-50 footer-nav">
        <div class="flex justify-between items-center p-3 border-b border-gray-900/60">
            <button onclick="exportToExcel()" class="bg-red-600 hover:bg-red-700 active:scale-95 transition text-white font-bold text-[10px] py-2 px-3 rounded-xl flex items-center gap-1.5 shadow-lg">
                <span>📊</span> خروجی اکسل
            </button>
            <div class="text-left">
                <span class="text-gray-400 text-[9px] block">جمع کل کرایه:</span>
                <span id="footerTotalFare" class="text-sm font-black text-white">۰ تومان</span>
            </div>
        </div>
        <div class="grid grid-cols-3 text-center py-2 text-gray-400 text-[10px]">
            <button onclick="changeMonth(-1)" class="flex flex-col items-center gap-0.5 hover:text-white">
                <span class="text-base">➡️</span> <span>ماه قبل</span>
            </button>
            <button onclick="goToCurrentMonth()" class="flex flex-col items-center gap-0.5 hover:text-white text-red-500">
                <span class="text-base">📅</span> <span class="font-bold">امروز</span>
            </button>
            <button onclick="changeMonth(1)" class="flex flex-col items-center gap-0.5 hover:text-white">
                <span class="text-base">⬅️</span> <span>ماه بعد</span>
            </button>
        </div>
    </div>

    <script>
        const weekdays = ['شنبه','یکشنبه','دوشنبه','سه‌شنبه','چهارشنبه','پنجشنبه','جمعه'];
        const monthsData = [
            { name: 'فروردین', days: 31, index: 1, startWd: 6 },
            { name: 'اردیبهشت', days: 31, index: 2, startWd: 2 },
            { name: 'خرداد', days: 31, index: 3, startWd: 5 },
            { name: 'تیر', days: 31, index: 4, startWd: 0 },
            { name: 'مرداد', days: 31, index: 5, startWd: 2 },
            { name: 'شهریور', days: 31, index: 6, startWd: 5 },
            { name: 'مهر', days: 30, index: 7, startWd: 1 },
            { name: 'آبان', days: 30, index: 8, startWd: 4 },
            { name: 'آذر', days: 30, index: 9, startWd: 6 },
            { name: 'دی', days: 30, index: 10, startWd: 1 },
            { name: 'بهمن', days: 30, index: 11, startWd: 4 },
            { name: 'اسفند', days: 29, index: 12, startWd: 0 }
        ];

        const holidays = {
            "1405-01-01":"نوروز","1405-01-02":"نوروز","1405-01-03":"نوروز","1405-01-04":"نوروز","1405-01-12":"جمهوری اسلامی","1405-01-13":"سیزده بدر",
            "1405-03-06":"عید قربان","1405-03-14":"رحلت امام","1405-03-15":"۱۵ خرداد",
            "1405-04-03":"تاسوعا","1405-04-04":"عاشورا","1405-05-13":"اربعین","1405-05-21":"رحلت پیامبر",
            "1405-05-22":"شهادت امام رضا","1405-05-30":"امام عسکری","1405-06-08":"میلاد پیامبر",
            "1405-10-02":"ولادت امام علی","1405-10-16":"مبعث","1405-11-05":"نیمه شعبان","1405-11-22":"۲۲ بهمن"
        };

        let currentMonthIdx = 0;
        let chartInstance = null;
        // بازیابی کل اطلاعات ذخیره شده از حافظه مرورگر گوشی
        let appStorage = JSON.parse(localStorage.getItem('night_shift_db_1405')) || {};

        function initApp() {
            // تنظیم تم ذخیره شده قبلی
            let savedTheme = localStorage.getItem('app_theme') || 'dark';
            setTheme(savedTheme);

            renderMonth(currentMonthIdx);
            initChart();
            updateCalculations();
        }

        function setTheme(theme) {
            const btn = document.getElementById('themeToggle');
            if (theme === 'dark') {
                document.body.className = 'dark';
                btn.innerText = '☀️';
                // اعمال استایل های اختصاصی تم دارک به المان‌ها
                document.querySelectorAll('.dynamic-card').forEach(el => el.style.backgroundColor = '#16161f');
                document.querySelectorAll('.dynamic-subcard').forEach(el => el.style.backgroundColor = '#12121a');
                document.querySelector('.footer-nav').style.backgroundColor = '#0d0d12ec';
            } else {
                document.body.className = 'light';
                btn.innerText = '🌙';
                document.querySelectorAll('.dynamic-card').forEach(el => el.style.backgroundColor = '#ffffff');
                document.querySelectorAll('.dynamic-subcard').forEach(el => el.style.backgroundColor = '#f0f2f5');
                document.querySelector('.footer-nav').style.backgroundColor = '#ffffffec';
            }
            localStorage.setItem('app_theme', theme);
        }

        document.getElementById('themeToggle').onclick = () => {
            let isDark = document.body.classList.contains('dark');
            setTheme(isDark ? 'light' : 'dark');
            if(chartInstance) {
                chartInstance.options.scales.y.grid.color = isDark ? '#e5e7eb' : '#27273a';
                chartInstance.update();
            }
        };

        function goToCurrentMonth() {
            currentMonthIdx = 0; // بازگشت به فروردین (یا هر ماهی که مایلید)
            renderMonth(currentMonthIdx);
        }

        function changeMonth(dir) {
            currentMonthIdx += dir;
            if (currentMonthIdx < 0) currentMonthIdx = 11;
            if (currentMonthIdx > 11) currentMonthIdx = 0;
            renderMonth(currentMonthIdx);
        }

        function renderMonth(idx) {
            const m = monthsData[idx];
            document.getElementById('monthTitle').innerText = `${m.name} ۱۴۰۵`;
            const listContainer = document.getElementById('daysList');
            listContainer.innerHTML = '';
            
            let wd = m.startWd;

            for (let d = 1; d <= m.days; d++) {
                let dateStr = `1405-${String(m.index).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                let dayName = weekdays[wd];
                let isFriday = (wd === 6);
                let isHoliday = !!holidays[dateStr];
                
                // منطق ۱ و ۲: لود مقادیر پیش‌فرض یا بازیابی از استوریج گوشی
                let dayData = appStorage[dateStr] || {
                    checked: false, // ابتدا تیک ندارد
                    in: (isHoliday || isFriday) ? '' : '19:00', // روزهای معمولی ۱۹
                    out: (isHoliday || isFriday) ? '' : '08:00', // روزهای معمولی ۸
                    fare: '' // کرایه کاملا خالی
                };

                let rowBg = isHoliday ? 'bg-red-950/20 border-red-900/30' : isFriday ? 'bg-purple-950/10 border-purple-900/20' : 'bg-[#16161f] dark:bg-[#16161f] border-gray-800/40';
                let labelColor = isHoliday ? 'text-red-400 font-bold' : isFriday ? 'text-purple-400' : 'text-gray-400 dark:text-gray-300';

                let rowHtml = `
                    <div class="grid grid-cols-12 gap-1 items-center p-1.5 rounded-xl text-center text-xs border ${rowBg} day-row" data-date="${dateStr}" data-holiday="${isHoliday || isFriday}">
                        <div class="col-span-1 text-right">
                            <input type="checkbox" ${dayData.checked ? 'checked' : ''} onchange="rowCheckedToggle(this)" class="chk accent-red-500 h-4 w-4 rounded bg-gray-900 border-gray-700">
                        </div>
                        <div class="col-span-3 text-right pr-1 leading-tight">
                            <span class="text-[10px] block font-bold ${labelColor}">${d} ${m.name}</span>
                            <span class="text-[8px] text-gray-500 block">${dayName} ${isHoliday ? '• ' + holidays[dateStr] : ''}</span>
                        </div>
                        <div class="col-span-2"><input type="time" value="${dayData.in}" oninput="inputLiveTrigger(this)" class="in w-full bg-gray-100 dark:bg-[#1c1c27] text-slate-900 dark:text-white p-1 rounded border border-gray-300 dark:border-gray-800 text-center text-[10px]"></div>
                        <div class="col-span-2"><input type="time" value="${dayData.out}" oninput="inputLiveTrigger(this)" class="out w-full bg-gray-100 dark:bg-[#1c1c27] text-slate-900 dark:text-white p-1 rounded border border-gray-300 dark:border-gray-800 text-center text-[10px]"></div>
                        <div class="col-span-1 text-red-500 font-bold text-[10px] ot-cell">—</div>
                        <div class="col-span-3"><input type="text" value="${dayData.fare}" placeholder="۰" oninput="moneyInputTrigger(this)" class="money w-full bg-gray-100 dark:bg-[#1c1c27] text-slate-900 dark:text-white font-bold p-1 rounded border border-gray-300 dark:border-gray-800 text-left px-1 text-[10px]"></div>
                    </div>
                `;
                listContainer.insertAdjacentHTML('beforeend', rowHtml);
                wd = (wd + 1) % 7;
            }
            updateCalculations();
        }

        function rowCheckedToggle(chk) {
            let row = chk.closest('[data-date]');
            let isHoliday = row.getAttribute('data-holiday') === 'true';
            // منطق: اگر روز تعطیل تیک خورد، مقادیر ۱۹ و ۸ اتوماتیک پر شوند
            if (chk.checked && isHoliday) {
                row.querySelector('.in').value = '19:00';
                row.querySelector('.out').value = '08:00';
            }
            updateCalculations();
        }

        function moneyInputTrigger(input) {
            let val = input.value.replace(/[^\d]/g, '');
            input.value = val.replace(/\B(?=(\d{3})+(?!\d))/g, ",");
            
            // اگر کرایه دستی پر شد، تیک روز اتوماتیک بخورد
            let row = input.closest('[data-date]');
            let chk = row.querySelector('.chk');
            if (input.value !== '' && !chk.checked) {
                chk.checked = true;
                rowCheckedToggle(chk);
                return;
            }
            updateCalculations();
        }

        function inputLiveTrigger() {
            updateCalculations();
        }

        function updateCalculations() {
            let totalFare = 0, totalDays = 0, totalOtMinutes = 0;
            let dailyOtHours = [];
            let dailyLabels = [];

            const rows = document.querySelectorAll('#daysList .day-row');
            rows.forEach((row, i) => {
                let dateStr = row.getAttribute('data-date');
                let chk = row.querySelector('.chk').checked;
                let inVal = row.querySelector('.in').value;
                let outVal = row.querySelector('.out').value;
                let fareString = row.querySelector('.money').value;
                let fareVal = parseInt(fareString.replace(/,/g, '')) || 0;
                let isHoliday = row.getAttribute('data-holiday') === 'true';

                // منطق ۳: ذخیره خودکار در دیتابیس لوکال گوشی
                appStorage[dateStr] = { checked: chk, in: inVal, out: outVal, fare: fareString };

                let otHours = 0;

                // منطق ۴: فقط اگر تیک فعال باشد در محاسبات اعمال می‌شود
                if (chk) {
                    totalDays++;
                    totalFare += fareVal;

                    if (inVal && outVal) {
                        let [ih, im] = inVal.split(':').map(Number);
                        let [oh, om] = outVal.split(':').map(Number);
                        let startMin = ih * 60 + im;
                        let endMin = oh * 60 + om;
                        if (endMin < startMin) endMin += 1440;
                        let totalMinutes = endMin - startMin;

                        if (isHoliday) {
                            otHours = totalMinutes / 60; // کل ساعات تعطیلات اضافه کاری است
                        } else {
                            if (endMin > 1080) {
                                let otStart = Math.max(startMin, 1080);
                                let otEnd = Math.min(endMin, 1200);
                                if (otEnd > otStart) otHours = (otEnd - otStart) / 60;
                            }
                        }
                    }
                }

                totalOtMinutes += otHours * 60;
                row.querySelector('.ot-cell').innerText = otHours > 0 ? otHours.toFixed(1) : '—';
                
                dailyOtHours.push(otHours);
                dailyLabels.push(i + 1);
            });

            // ذخیره نهایی در دیتابیس گوشی
            localStorage.setItem('night_shift_db_1405', JSON.stringify(appStorage));

            let otH = Math.floor(totalOtMinutes / 60);
            let otM = Math.round(totalOtMinutes % 60);
            
            document.getElementById('totalFareBadge').innerText = totalFare.toLocaleString('fa-IR');
            document.getElementById('footerTotalFare').innerText = `${totalFare.toLocaleString('fa-IR')} تومان`;
            document.getElementById('totalOtBadge').innerText = `${String(otH).padStart(2,'0')}:${String(otM).padStart(2,'0')}`;
            document.getElementById('totalDaysBadge').innerText = totalDays.toLocaleString('fa-IR');

            if (chartInstance) {
                chartInstance.data.labels = dailyLabels;
                chartInstance.data.datasets[0].data = dailyOtHours;
                chartInstance.update();
            }
        }

        function initChart() {
            const ctx = document.getElementById('analyticsChart').getContext('2d');
            chartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: [],
                    datasets: [{
                        data: [],
                        backgroundColor: '#ef4444',
                        borderRadius: 3,
                        borderSkipped: false,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { grid: { display: false }, ticks: { color: '#6b7280', font: { size: 7 } } },
                        y: { grid: { color: '#27273a' }, ticks: { color: '#6b7280', font: { size: 7 } } }
                    }
                }
            });
        }

        function exportToExcel() {
            let data = [["تاریخ", "ساعت ورود", "ساعت خروج", "کرایه دریافتی (تومان)"]];
            for (let date in appStorage) {
                let rec = appStorage[date];
                if (rec.checked) {
                    data.push([date, rec.in, rec.out, rec.fare.replace(/,/g, '')]);
                }
            }
            let ws = XLSX.utils.aoa_to_sheet(data);
            let wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "گزارش کارکرد");
            XLSX.writeFile(wb, `WorkShift_1405.xlsx`);
        }

        window.onload = initApp;
    </script>
</body>
</html>
