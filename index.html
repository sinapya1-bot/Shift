<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Shift Calendar RUIX - 1405</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

    <style>
        body {
            font-family: 'Vazirmatn', sans-serif;
            -webkit-tap-highlight-color: transparent;
            background-color: #060608;
            color: #f4f4f5;
            transition: background-color 0.25s, color 0.25s;
        }
        body.light { background-color: #f4f5f7; color: #09090b; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 3px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1f1f23; border-radius: 10px; }
        body.light .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; }

        .time-input, .money-input {
            font-family: monospace !important;
            direction: ltr !important;
            text-align: center;
            background: #0c0c10;
            border: 1px solid #1a1a22;
            color: #ffffff;
            transition: all 0.2s ease;
            -webkit-appearance: none;
            appearance: none;
        }
        body.light .time-input, body.light .money-input {
            background: #ffffff; border-color: #e4e4e7; color: #09090b;
        }
        .time-input:focus, .money-input:focus {
            border-color: #ef4444; box-shadow: 0 0 8px rgba(239, 68, 68, 0.2); outline: none;
        }

        .ruix-cb { position: relative; display: inline-flex; align-items: center; cursor: pointer; }
        .ruix-cb-box {
            width: 18px; height: 18px; border: 1.5px solid #27272a; border-radius: 6px;
            position: relative; transition: all 0.2s ease; background: #0c0c10;
        }
        body.light .ruix-cb-box { border-color: #cbd5e1; background: #ffffff; }
        .ruix-cb-input:checked + .ruix-cb-box {
            background: #ef4444; border-color: #ef4444; box-shadow: 0 0 10px rgba(239, 68, 68, 0.35);
        }
        .ruix-cb-box::after {
            content: ''; position: absolute; left: 5px; top: 2px; width: 4px; height: 7px;
            border: solid white; border-width: 0 2px 2px 0; transform: rotate(45deg) scale(0);
            transition: transform 0.15s ease;
        }
        .ruix-cb-input:checked + .ruix-cb-box::after { transform: rotate(45deg) scale(1); }

        .ruix-card {
            background: rgba(12, 12, 16, 0.75); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.02);
        }
        body.light .ruix-card { background: rgba(255, 255, 255, 0.85); border: 1px solid rgba(0, 0, 0, 0.04); }
    </style>
</head>
<body class="pb-36 selection:bg-red-500/10">

    <div class="max-w-md mx-auto px-4 pt-5">
        <div class="flex justify-between items-center mb-6">
            <div class="flex items-center gap-2.5">
                <div class="w-1 h-5 bg-red-500 rounded-full shadow-[0_0_8px_rgba(239,68,68,0.5)]"></div>
                <div>
                    <h1 class="text-[11px] font-black tracking-widest text-zinc-500 uppercase">ENTERPRISE SHIFT</h1>
                    <p class="text-[9px] text-zinc-400 font-medium">پلتفرم مدیریت کارکرد ۱۴۰۵</p>
                </div>
            </div>
            <button onclick="toggleTheme()" id="themeBtn" class="p-2 rounded-xl bg-zinc-900/50 border border-zinc-800/80 hover:border-zinc-700 transition-colors text-zinc-400">🌙</button>
        </div>

        <div class="ruix-card rounded-2xl p-3 mb-4 flex justify-between items-center shadow-lg">
            <button onclick="changeMonth(-1)" class="text-zinc-500 hover:text-red-500 p-1 transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"></path></svg>
            </button>
            <h2 id="monthTitle" class="text-xs font-bold text-zinc-200 tracking-wide">خرداد ۱۴۰۵</h2>
            <button onclick="changeMonth(1)" class="text-zinc-500 hover:text-red-500 p-1 transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"></path></svg>
            </button>
        </div>

        <div class="grid grid-cols-3 gap-2 mb-5">
            <div class="ruix-card p-3 rounded-2xl text-center">
                <span class="text-zinc-500 text-[8px] block mb-1 font-medium">تراکنش کرایه</span>
                <span id="totalFareBadge" class="text-xs font-black text-zinc-100">۰</span>
                <span class="text-[7px] text-zinc-600 block mt-0.5">تومان</span>
            </div>
            <div class="ruix-card p-3 rounded-2xl text-center">
                <span class="text-zinc-500 text-[8px] block mb-1 font-medium">کل اضافه کاری</span>
                <span id="totalOtBadge" class="text-xs font-black text-red-500">۰۰:۰۰</span>
                <span class="text-[7px] text-zinc-600 block mt-0.5">ساعت</span>
            </div>
            <div class="ruix-card p-3 rounded-2xl text-center">
                <span class="text-zinc-500 text-[8px] block mb-1 font-medium">تسویه کارکرد</span>
                <span id="totalDaysBadge" class="text-xs font-black text-emerald-400">۰</span>
                <span class="text-[7px] text-zinc-600 block mt-0.5">روز</span>
            </div>
        </div>

        <div class="grid grid-cols-12 gap-1 text-center text-[9px] text-zinc-500 font-bold mb-2 px-2">
            <div class="col-span-1 text-right">وضعیت</div>
            <div class="col-span-3 text-right pr-2">توالی تقویم</div>
            <div class="col-span-2">ورود</div>
            <div class="col-span-2">خروج</div>
            <div class="col-span-1">اضافه</div>
            <div class="col-span-3 text-left pl-2">کرایه (تومان)</div>
        </div>

        <div id="daysList" class="space-y-1.5 max-h-[50vh] overflow-y-auto custom-scrollbar pr-0.5"></div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-[#060608]/95 border-t border-zinc-900/60 shadow-2xl z-50">
        <div class="flex justify-between items-center p-3 px-4 border-b border-zinc-900/20">
            <button onclick="exportToExcel()" class="bg-gradient-to-r from-red-600 to-red-700 hover:from-red-500 transition-all text-white font-bold text-[9px] py-2 px-4 rounded-xl flex items-center gap-1.5 shadow-lg">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                خروجی اکسل
            </button>
            <div class="text-left">
                <span class="text-zinc-600 text-[8px] block uppercase tracking-wider font-bold">جمع کل کرایه:</span>
                <span id="footerTotalFare" class="text-xs font-black text-zinc-100">۰ تومان</span>
            </div>
        </div>
        <div class="grid grid-cols-3 text-center py-2.5 text-zinc-500 text-[9px] font-bold">
            <button onclick="changeMonth(-1)" class="flex flex-col items-center gap-1 hover:text-red-500 transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13 5l7 7-7 7M5 5l7 7-7 7"></path></svg>
                <span>ماه قبل</span>
            </button>
            <button onclick="goToCurrentMonth()" class="flex flex-col items-center gap-1 text-red-500">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                <span>امروز</span>
            </button>
            <button onclick="changeMonth(1)" class="flex flex-col items-center gap-1 hover:text-red-500 transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M11 19l-7-7 7-7M19 19l-7-7 7-7"></path></svg>
                <span>ماه بعد</span>
            </button>
        </div>
    </div>

    <script>
        const weekdays = ['شنبه','یکشنبه','دوشنبه','سه‌شنبه','چهارشنبه','پنجشنبه','جمعه'];
        // دیتای دقیق تقویم ۱۴۰۵ با روزهای شروع کاملاً تست شده
        const monthsData = [
            { name: 'فروردین', days: 31, index: 1, startWd: 0 }, // فروردین ۱۴۰۵ از شنبه شروع می‌شود (اندیس ۰)
            { name: 'اردیبهشت', days: 31, index: 2, startWd: 3 },
            { name: 'خرداد', days: 31, index: 3, startWd: 6 },
            { name: 'تیر', days: 31, index: 4, startWd: 1 },
            { name: 'مرداد', days: 31, index: 5, startWd: 3 },
            { name: 'شهریور', days: 31, index: 6, startWd: 6 },
            { name: 'مهر', days: 30, index: 7, startWd: 2 },
            { name: 'آبان', days: 30, index: 8, startWd: 5 },
            { name: 'آذر', days: 30, index: 9, startWd: 0 },
            { name: 'دی', days: 30, index: 10, startWd: 2 },
            { name: 'بهمن', days: 30, index: 11, startWd: 5 },
            { name: 'اسفند', days: 29, index: 12, startWd: 1 }
        ];

        const holidays = {
            "1405-01-01":"نوروز","1405-01-02":"نوروز","1405-01-03":"نوروز","1405-01-04":"نوروز","1405-01-12":"جمهوری اسلامی","1405-01-13":"سیزده بدر",
            "1405-03-06":"عید قربان","1405-03-14":"رحلت امام","1405-03-15":"۱۵ خرداد","1405-04-03":"تاسوعا","1405-04-04":"عاشورا",
            "1405-05-13":"اربعین","1405-05-21":"رحلت پیامبر","1405-05-22":"شهادت امام رضا","1405-05-30":"امام عسکری",
            "1405-06-08":"میلاد پیامبر","1405-10-02":"ولادت امام علی","1405-10-16":"مبعث","1405-11-05":"نیمه شعبان","1405-11-22":"۲۲ بهمن"
        };

        let currentMonthIdx = 2; 
        let appStorage = JSON.parse(localStorage.getItem('ruix_shift_db_1405')) || {};
        let currentTheme = localStorage.getItem('ruix_theme') || 'dark';

        function initApp() {
            setTheme(currentTheme);
            renderMonth(currentMonthIdx);
        }

        function toggleTheme() {
            currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
            localStorage.setItem('ruix_theme', currentTheme);
            setTheme(currentTheme);
        }

        function setTheme(theme) {
            if(theme === 'light') {
                document.body.classList.add('light');
                document.getElementById('themeBtn').innerText = '☀️';
            } else {
                document.body.classList.remove('light');
                document.getElementById('themeBtn').innerText = '🌙';
            }
        }

        function goToCurrentMonth() {
            currentMonthIdx = 2; // خرداد دوره جاری پیش‌فرض
            renderMonth(currentMonthIdx);
        }

        function changeMonth(dir) {
            currentMonthIdx = (currentMonthIdx + dir + 12) % 12;
            renderMonth(currentMonthIdx);
        }

        function renderMonth(idx) {
            const m = monthsData[idx];
            document.getElementById('monthTitle').innerText = `${m.name} ۱۴۰۵`;
            const listContainer = document.getElementById('daysList');
            listContainer.innerHTML = '';
            
            let wd = m.startWd;

            for (let d = 1; d <= m.days; d++) {
                let dateStr = `1405-${String(m.index).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                let dayName = weekdays[wd];
                let isFriday = (wd === 6);
                let isHoliday = !!holidays[dateStr];
                let isSpecialDay = isFriday || isHoliday;
                
                let dayData = appStorage[dateStr] || {
                    checked: false, 
                    in: isSpecialDay ? '' : '19:00', 
                    out: isSpecialDay ? '' : '08:00', 
                    fare: '' 
                };

                let rowBorder = isHoliday ? 'border-red-900/40 bg-red-950/10' : isFriday ? 'border-purple-900/40 bg-purple-950/10' : 'border-zinc-900/40 bg-zinc-900/10 dark:bg-zinc-900/20';
                let labelColor = isHoliday ? 'text-red-400 font-bold' : isFriday ? 'text-purple-400 font-bold' : 'text-zinc-300 dark:text-zinc-300';

                let rowHtml = `
                    <div class="grid grid-cols-12 gap-1 items-center p-2 rounded-xl text-center text-xs border ${rowBorder} day-row transition-all" data-date="${dateStr}" data-holiday="${isSpecialDay}">
                        <div class="col-span-1 text-right flex items-center justify-start">
                            <label class="ruix-cb">
                                <input type="checkbox" ${dayData.checked ? 'checked' : ''} onchange="rowCheckedToggle(this)" class="ruix-cb-input hidden">
                                <span class="ruix-cb-box"></span>
                            </label>
                        </div>
                        <div class="col-span-3 text-right pr-1 leading-tight">
                            <span class="text-[10px] block font-bold ${labelColor}">${d} ${m.name}</span>
                            <span class="text-[7.5px] text-zinc-500 block">${dayName} ${isHoliday ? '• ' + holidays[dateStr] : ''}</span>
                        </div>
                        <div class="col-span-2"><input type="text" value="${dayData.in}" placeholder="--" oninput="timeInputFormat(this)" class="in time-input w-full p-1 rounded-lg text-[10px] font-bold"></div>
                        <div class="col-span-2"><input type="text" value="${dayData.out}" placeholder="--" oninput="timeInputFormat(this)" class="out time-input w-full p-1 rounded-lg text-[10px] font-bold"></div>
                        <div class="col-span-1 text-red-500 font-black text-[10px] ot-cell">—</div>
                        <div class="col-span-3"><input type="text" value="${dayData.fare}" placeholder="-" oninput="moneyInputTrigger(this)" class="money money-input w-full font-bold p-1 rounded-lg text-left px-1.5 text-[10px]"></div>
                    </div>
                `;
                listContainer.insertAdjacentHTML('beforeend', rowHtml);
                wd = (wd + 1) % 7;
            }
            updateCalculations();
        }

        function rowCheckedToggle(chk) {
            let row = chk.closest('[data-date]');
            let isSpecial = row.getAttribute('data-holiday') === 'true';
            if (chk.checked && isSpecial) {
                row.querySelector('.in').value = '19:00';
                row.querySelector('.out').value = '08:00';
            }
            updateCalculations();
        }

        function timeInputFormat(input) {
            let val = input.value.replace(/[^\d]/g, '');
            if(val.length > 4) val = val.substring(0,4);
            if(val.length > 2) {
                input.value = val.substring(0,2) + ':' + val.substring(2);
            } else {
                input.value = val;
            }
            updateCalculations();
        }

        function moneyInputTrigger(input) {
            let val = input.value.replace(/[^\d]/g, '');
            input.value = val.replace(/\B(?=(\d{3})+(?!\d))/g, ",");
            
            let row = input.closest('[data-date]');
            let chk = row.querySelector('.ruix-cb-input');
            if (input.value !== '' && !chk.checked) {
                chk.checked = true;
                rowCheckedToggle(chk);
            }
            updateCalculations();
        }

        function updateCalculations() {
            let totalFare = 0, totalDays = 0, totalOtMinutes = 0;

            const rows = document.querySelectorAll('#daysList .day-row');
            rows.forEach((row) => {
                let dateStr = row.getAttribute('data-date');
                let chk = row.querySelector('.ruix-cb-input').checked;
                let inVal = row.querySelector('.in').value;
                let outVal = row.querySelector('.out').value;
                let fareString = row.querySelector('.money').value;
                let fareVal = parseInt(fareString.replace(/,/g, '')) || 0;
                let isSpecial = row.getAttribute('data-holiday') === 'true';

                appStorage[dateStr] = { checked: chk, in: inVal, out: outVal, fare: fareString };

                let otMinutes = 0;

                if (chk) {
                    totalDays++;
                    totalFare += fareVal;

                    if (inVal.includes(':') && outVal.includes(':')) {
                        let [ih, im] = inVal.split(':').map(Number);
                        let [oh, om] = outVal.split(':').map(Number);
                        
                        let startMin = ih * 60 + im;
                        let endMin = oh * 60 + om;
                        if (endMin < startMin) endMin += 1440; 
                        
                        let totalMinutes = endMin - startMin;

                        if (isSpecial) {
                            otMinutes = totalMinutes; // تعطیلات کلاً اضافه‌کاری
                        } else {
                            if (totalMinutes > 480) {
                                otMinutes = totalMinutes - 480; // بالای ۸ ساعت روز عادی اضافه‌کاری
                            }
                        }
                    }
                }

                let otHoursFloat = otMinutes / 60;
                row.querySelector('.ot-cell').innerText = otHoursFloat > 0 ? otHoursFloat.toFixed(1) : '—';
                totalOtMinutes += otMinutes;
            });

            localStorage.setItem('ruix_shift_db_1405', JSON.stringify(appStorage));

            let otH = Math.floor(totalOtMinutes / 60);
            let otM = Math.round(totalOtMinutes % 60);
            
            document.getElementById('totalFareBadge').innerText = totalFare.toLocaleString('fa-IR');
            document.getElementById('footerTotalFare').innerText = `${totalFare.toLocaleString('fa-IR')} تومان`;
            document.getElementById('totalOtBadge').innerText = `${String(otH).padStart(2,'0')}:${String(otM).padStart(2,'0')}`;
            document.getElementById('totalDaysBadge').innerText = totalDays.toLocaleString('fa-IR');
        }

        function exportToExcel() {
            let data = [["تاریخ", "ساعت ورود", "ساعت خروج", "کرایه دریافتی"]];
            for (let date in appStorage) {
                let rec = appStorage[date];
                if (rec.checked) {
                    data.push([date, rec.in, rec.out, rec.fare.replace(/,/g, '')]);
                }
            }
            let ws = XLSX.utils.aoa_to_sheet(data);
            let wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "گزارش نهایی");
            XLSX.writeFile(wb, `Shift_Report_1405.xlsx`);
        }

        window.onload = initApp;
    </script>
</body>
</html>
